name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "*.tf"
      - ".config/**"

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Install terraform-docs
        run: |
          curl -sSL -o /tmp/tf-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v0.21.0/terraform-docs-v0.21.0-linux-amd64.tar.gz"
          tar -xzf /tmp/tf-docs.tar.gz -C /usr/local/bin terraform-docs

      - name: Regenerate README
        run: make docs

      - name: Push if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add README.md
            git commit -m "docs: regenerate README"
            git push
          fi
