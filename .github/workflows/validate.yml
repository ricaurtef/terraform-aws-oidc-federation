name: Validate

on:
  pull_request:

jobs:
  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Keep in sync with required_version in versions.tf.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init
        run: tflint --init

      - name: Lint
        run: tflint --recursive

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true

  docs:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install terraform-docs
        run: |
          curl -sSL -o /tmp/tf-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v0.21.0/terraform-docs-v0.21.0-linux-amd64.tar.gz"
          tar -xzf /tmp/tf-docs.tar.gz -C /usr/local/bin terraform-docs

      - name: Verify README is up to date
        run: |
          make docs
          git diff --exit-code README.md
